name: Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/cheques-app
            git pull origin main

            cd server
            npm install
            node migrate.js
            pm2 restart cheques-api

            cd ..
            npm install
            npm run build

            rm -rf /var/www/cheques/*
            cp -r dist/* /var/www/cheques/
            sudo nginx -t
            sudo systemctl reload nginx